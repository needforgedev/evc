# EVC monorepo — pub workspace root.
# This is NOT an app. It only ties the three apps and four shared packages
# together so a single `flutter pub get` resolves all of them, and melos can
# run scripts across every package at once.
#
# Build an individual app from its own directory, e.g.:
#   cd apps/rider  && flutter build apk   ->  dev.needforge.evcrider
#   cd apps/driver && flutter build apk   ->  dev.needforge.evcdriver
#   cd apps/admin  && flutter build apk   ->  dev.needforge.evcadmin
name: evc_workspace
publish_to: none

environment:
  sdk: ^3.11.0

# Every member listed here shares one resolved set of dependencies.
workspace:
  - apps/rider
  - apps/driver
  - apps/admin
  - packages/core
  - packages/ui_kit
  - packages/maps
  - packages/realtime

dev_dependencies:
  melos: ^7.0.0

# Melos 7 reads its config from here (under the `melos:` key in the workspace
# root pubspec). Run a script with: `dart run melos run <name>`.
melos:
  scripts:
    analyze:
      description: Static analysis across the whole workspace.
      run: dart analyze .

    test:
      description: Run unit tests in every package that has a test/ dir.
      run: flutter test
      exec:
        concurrency: 1
      packageFilters:
        dirExists: test

    build:apk:
      description: "Build release APKs for all three apps (rider, driver, admin)."
      run: flutter build apk
      exec:
        concurrency: 1
      packageFilters:
        scope:
          - evcrider
          - evcdriver
          - evcadmin
